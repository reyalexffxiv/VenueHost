name: PR Build

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build
        run: dotnet build .\VenueHost.sln --configuration Release

      - name: Package plugin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\dist | Out-Null
          Copy-Item .\VenueHost\bin\Release\VenueHost.dll .\dist\ -Force
          Copy-Item .\VenueHost\bin\Release\*.dll .\dist\ -Force
          Copy-Item .\VenueHost\VenueHost.json .\dist\ -Force
          if (Test-Path .\VenueHost\bin\Release\runtimes) { Copy-Item .\VenueHost\bin\Release\runtimes .\dist\runtimes -Recurse -Force }
          Compress-Archive -Path .\dist\* -DestinationPath .\latest.zip -Force

      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VenueHost
          path: .\latest.zip
          if-no-files-found: error
          retention-days: 7
