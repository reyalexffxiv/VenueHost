name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build and package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\Build-DalamudPackage.ps1

      - name: Create or update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zipPath = ".\dist\VenueHost-latest.zip"

          gh release view $tag --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $zipPath --repo $env:GITHUB_REPOSITORY --title "Venue Host $tag" --notes "Venue Host beta release." --prerelease
          } else {
            gh release upload $tag $zipPath --repo $env:GITHUB_REPOSITORY --clobber
          }
